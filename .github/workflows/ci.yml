name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e '.[dev]'

      - name: Run pytest
        run: pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e '.[dev]'

      - name: Run ruff
        run: ruff check .

  migration-smoke:
    runs-on: ubuntu-latest
    env:
      # Alembic's env.py reads sqlalchemy.url from app_settings.database_url,
      # which is populated from the DATABASE_URL env var. Use a fresh SQLite
      # file so the migration chain runs from empty schema to head.
      DATABASE_URL: "sqlite:///./ci-migration-smoke.db"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e '.[dev]'

      - name: Run alembic upgrade head against fresh SQLite
        run: |
          alembic upgrade head
          # Print the resulting revision so the log shows we landed on head.
          alembic current
